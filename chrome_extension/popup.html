<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>URL Shortener</title>
  <style>
    :root {
      --background: #282A36;
      --current-line: #44475A;
      --foreground: #F8F8F2;
      --comment: #6272A4;
      --cyan: #8BE9FD;
      --green: #50FA7B;
      --pink: #FF79C6;
      --purple: #BD93F9;
      --red: #FF5555;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 360px;
      background: var(--background);
      color: var(--foreground);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      padding: 1rem;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--current-line);
    }

    .header svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: var(--cyan);
    }

    .header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--purple);
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--comment);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .url-box {
      background: var(--current-line);
      border-radius: 0.375rem;
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.75rem;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.8rem;
      color: var(--foreground);
      word-break: break-all;
      line-height: 1.4;
      min-height: 2.5rem;
      max-height: 5rem;
      overflow-y: auto;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    .btn-primary {
      background: var(--purple);
      color: var(--background);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--pink);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result {
      margin-top: 0.75rem;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--current-line);
      border-radius: 0.375rem;
      padding: 0.6rem 0.75rem;
    }

    .result-row a {
      flex: 1;
      color: var(--cyan);
      text-decoration: none;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.8rem;
      word-break: break-all;
    }

    .result-row a:hover {
      color: var(--pink);
      text-decoration: underline;
    }

    .btn-copy {
      flex-shrink: 0;
      padding: 0.3rem 0.65rem;
      border: 1px solid var(--comment);
      border-radius: 0.25rem;
      background: transparent;
      color: var(--foreground);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-copy:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn-copy.copied {
      border-color: var(--green);
      color: var(--green);
    }

    .error {
      margin-top: 0.75rem;
      padding: 0.6rem 0.75rem;
      background: var(--red);
      color: var(--background);
      border-radius: 0.375rem;
      font-size: 0.8rem;
    }

    .hidden {
      display: none;
    }

    details {
      margin-top: 0.75rem;
    }

    summary {
      font-size: 0.75rem;
      color: var(--comment);
      cursor: pointer;
      user-select: none;
      padding: 0.25rem 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary .chevron {
      font-size: 0.6rem;
      transition: rotate 0.15s ease;
      display: inline-block;
    }

    details[open] summary .chevron {
      rotate: 90deg;
    }

    .advanced-content {
      margin-top: 0.6rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--current-line);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .adv-label {
      font-size: 0.7rem;
      color: var(--comment);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .form-check {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .form-check input[type="checkbox"] {
      accent-color: var(--purple);
      width: 13px;
      height: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .form-check label {
      font-size: 0.8rem;
      color: var(--foreground);
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
    }

    .custom-id-group {
      display: flex;
      align-items: stretch;
      background: var(--current-line);
      border-radius: 0.375rem;
      overflow: hidden;
    }

    .custom-id-prefix {
      display: flex;
      align-items: center;
      padding: 0.45rem 0.5rem;
      color: var(--comment);
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.72rem;
      white-space: nowrap;
      border-right: 1px solid var(--background);
      user-select: none;
    }

    .custom-id-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.45rem 0.5rem;
      color: var(--foreground);
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.8rem;
      outline: none;
      min-width: 0;
    }

    .custom-id-input::placeholder {
      color: var(--comment);
    }
  </style>
</head>

<body>
  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <path d="M439 7c9.4-9.4 24.6-9.4 33.9 0l32 32c9.4 9.4 9.4 24.6 0 33.9l-87 87 39 39c6.9 6.9 8.9 17.2 5.2 26.2s-12.5 14.8-22.2 14.8l-144 0c-13.3 0-24-10.7-24-24l0-144c0-9.7 5.8-18.5 14.8-22.2s19.3-1.7 26.2 5.2l39 39L439 7zM72 272l144 0c13.3 0 24 10.7 24 24l0 144c0 9.7-5.8 18.5-14.8 22.2s-19.3 1.7-26.2-5.2l-39-39L73 505c-9.4 9.4-24.6 9.4-33.9 0L7 473c-9.4-9.4-9.4-24.6 0-33.9l87-87L55 313c-6.9-6.9-8.9-17.2-5.2-26.2s12.5-14.8 22.2-14.8z" />
    </svg>
    <h1>URL Shortener</h1>
  </div>

  <label>Current page</label>
  <div id="current-url" class="url-box"></div>

  <details id="advanced-details">
    <summary><span class="chevron">&#9654;</span> Advanced options</summary>
    <div class="advanced-content">
      <div>
        <div class="adv-label">Expiry</div>
        <div class="form-check">
          <input type="checkbox" id="permanent-check">
          <label for="permanent-check">Permanent link (never expires)</label>
        </div>
      </div>
      <div>
        <div class="adv-label">Custom short name</div>
        <div class="custom-id-group">
          <span class="custom-id-prefix">s.slvr.io/</span>
          <input type="text" id="custom-id-input" class="custom-id-input" placeholder="my-link" autocomplete="off" spellcheck="false">
        </div>
      </div>
    </div>
  </details>

  <button id="shorten-btn" class="btn btn-primary" style="margin-top: 0.75rem;">Shorten URL</button>

  <div id="result" class="result hidden">
    <label>Short URL</label>
    <div class="result-row">
      <a id="short-url" href="#" target="_blank"></a>
      <button id="copy-btn" class="btn-copy">Copy</button>
    </div>
  </div>

  <div id="error" class="error hidden"></div>

  <script src="popup.js"></script>
</body>

</html>
