<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="URL Shortener - Create short, memorable links">
  <meta name="theme-color" content="#4299E1">
  <title>URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"
    integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root {
      color-scheme: dark;
      --background: oklch(0.2538 0.0206 289);
      --current-line: oklch(0.4028 0.0322 277.83);
      --foreground: oklch(0.9775 0.0079 106.55);
      --comment: oklch(0.5764 0.0869 290.65);
      --cyan: oklch(0.9214 0.118 181.4);
      --green: oklch(0.9029 0.1974 142.21);
      --orange: oklch(0.8703 0.1097 74.76);
      --pink: oklch(0.7616 0.1684 350.8);
      --purple: oklch(0.742 0.1485 301.88);
      --blue: oklch(0.6775 0.1815 288.17);
      --red: oklch(0.7767 0.132 32.13);
      --yellow: oklch(0.975 0.1493 108.88);
    }

    html {
      height: 100%;
      background: var(--background);
      color: var(--foreground);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow-y: auto;
      scroll-behavior: smooth;
      scrollbar-gutter: stable;
    }

    body {
      min-height: 100%;
      background: var(--background);
      color: var(--foreground);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .form {
      width: 100%;
      max-width: 900px;
      margin-top: 10vh;
    }

    .main-title {
      margin-block-end: 1.5rem;
    }

    .form-signin {
      background: var(--current-line);
      padding: 2rem;
      border-radius: 0.5rem;
      width: 100%;
      border: none;
    }

    .form-signin .form-group {
      margin-bottom: 1.25rem;
      width: 100%;
    }

    .form-signin .form-group:last-child {
      margin-bottom: 0;
    }

    .form-signin h1 {
      color: var(--purple);
      font-weight: 700;
      margin-bottom: 0.25rem;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      text-wrap: balance;
    }

    .form-signin p {
      color: var(--foreground);
      margin-bottom: 0;
    }

    .form-control {
      border: 1px solid var(--comment);
      border-radius: 0.375rem;
      padding: 0.625rem 1rem;
      background-color: var(--background);
      box-shadow: none;
      color: var(--foreground);
      width: 100%;
      transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease, translate 0.2s ease;
    }

    .form-control:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px oklch(from var(--purple) l c h / 0.2);
      background-color: var(--current-line);
      outline: none;
      color: var(--foreground);
      translate: 0 -1px;
    }

    .form-control::placeholder {
      color: var(--comment);
    }

    .btn {
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      border-radius: 0.375rem;
      transition: all 0.2s ease;
    }

    .btn:active {
      scale: 0.98;
    }

    .btn:focus-visible {
      outline: 2px solid var(--purple);
      outline-offset: 2px;
    }

    .btn-primary {
      background-color: var(--purple);
      border-color: var(--purple);
      color: var(--background);
      font-weight: 700;
    }

    .btn-primary:is(:hover, :focus) {
      background-color: var(--pink);
      border-color: var(--pink);
      color: var(--background);
    }

    .btn-primary:disabled {
      background-color: var(--comment);
      border-color: var(--comment);
      color: var(--background);
      opacity: 0.6;
      cursor: not-allowed;
    }

    .icon-wrapper {
      animation: pulse 3s ease-in-out infinite;
    }

    .icon-wrapper .fas {
      color: var(--cyan);
      margin-block-end: 0.75rem;
      transition: transform 0.2s ease;
    }

    #results {
      display: grid;
      grid-template-rows: 0fr;
      width: 100%;
      margin-top: 0;
      margin-bottom: 0;
      opacity: 0;
      transition:
        grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.3s ease,
        margin-top 0.35s ease;
    }

    #results.active {
      grid-template-rows: 1fr;
      opacity: 1;
      margin-top: 2rem;
      margin-bottom: 0.25rem;
    }

    #results,
    #response,
    #response_body {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #results::-webkit-scrollbar,
    #response::-webkit-scrollbar,
    #response_body::-webkit-scrollbar {
      display: none;
    }

    #response {
      overflow: hidden;
      min-height: 0;
      margin: 0;
    }

    #response_body {
      margin: 0;
    }

    .alert {
      border: none;
      border-radius: 0.5rem;
      width: 100%;
      margin: 0;
      position: relative;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .alert-success {
      background-color: var(--green) !important;
      color: var(--background);
      border-color: var(--green) !important;
      padding-inline-end: 6.5rem;
    }

    .alert-success .short-url-link {
      color: var(--background);
      text-decoration: underline;
      font-weight: 700;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      word-break: break-all;
      transition: opacity 0.15s ease;
    }

    .alert-success .short-url-link:hover {
      opacity: 0.8;
    }

    .alert-danger {
      background-color: var(--red) !important;
      color: var(--foreground);
      border-color: var(--red) !important;
    }

    .copy-btn-float {
      position: absolute;
      inset: 0.75rem 0.75rem auto auto;
      display: inline-flex;
      align-items: baseline;
      gap: 0.25rem;
      padding: 0.35rem 0.5rem;
      min-width: 90px;
      height: 1.75rem;
      justify-content: center;
      background-color: var(--green);
      color: var(--background);
      border: 2px solid var(--background);
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.2;
      cursor: pointer;
      transition: opacity 0.15s ease, translate 0.15s ease, scale 0.15s ease;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      z-index: 10;
    }

    .copy-btn-float i {
      color: var(--background);
      font-size: 0.75rem;
      margin: 0;
    }

    .copy-btn-float:hover {
      opacity: 0.9;
      translate: 0 -1px;
    }

    .copy-btn-float:active {
      scale: 0.95;
    }

    .copy-btn-float.copied {
      background-color: var(--green) !important;
      border-color: var(--background) !important;
      color: var(--background) !important;
    }

    @keyframes checkmark {
      0% {
        opacity: 0;
        scale: 0.5;
        rotate: -45deg;
      }

      50% {
        opacity: 1;
        scale: 1.1;
        rotate: 0deg;
      }

      100% {
        scale: 1;
        rotate: 0deg;
      }
    }

    .checkmark {
      display: inline-block;
      animation: checkmark 0.4s ease-out;
    }

    @keyframes pulse {
      0%, 100% { scale: 1; }
      50% { scale: 1.05; }
    }

    .toast {
      border: none;
      border-radius: 0.5rem;
      min-width: 350px;
      max-width: 500px;
      box-shadow: 0 4px 12px oklch(0 0 0 / 0.3);
      overflow: hidden;
    }

    .toast .btn-close {
      background: transparent url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%2322212C'%3e%3cpath d='M.293.293a1 1 0 0 1 1.414 0L8 6.586 14.293.293a1 1 0 1 1 1.414 1.414L9.414 8l6.293 6.293a1 1 0 0 1-1.414 1.414L8 9.414l-6.293 6.293a1 1 0 0 1-1.414-1.414L6.586 8 .293 1.707a1 1 0 0 1 0-1.414z'/%3e%3c/svg%3e") center/1em auto no-repeat;
      opacity: 0.8;
      flex-shrink: 0;
    }

    .toast .btn-close:hover {
      opacity: 1;
    }

    .toast .toast-icon {
      font-size: 1.25rem;
      color: var(--background);
      flex-shrink: 0;
    }

    .toast .toast-message {
      color: var(--background);
      font-size: 0.95rem;
    }

    .toast-body {
      padding: 1rem;
      display: flex;
      align-items: center;
      font-weight: 600;
      color: var(--background);
      line-height: 1.4;
    }

    .toast-container {
      z-index: 9999;
    }

    @media (max-width: 768px) {
      body {
        padding: 0.75rem;
        padding-block-start: 1rem;
      }

      .form {
        margin-top: 4vh;
      }

      .form-signin {
        padding: 1.25rem;
      }

      .form-signin h1 {
        font-size: 1.75rem;
      }

      .main-title {
        margin-bottom: 1rem;
      }

      .icon-wrapper .fas {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }

      .form-signin .form-group {
        margin-bottom: 1rem;
      }

      .btn {
        padding: 0.5rem 1rem;
      }

      .form-control {
        padding: 0.5rem 0.875rem;
      }
    }

    .d-grid {
      display: grid;
    }

    .gap-2 {
      gap: 0.5rem;
    }
  </style>
</head>

<body>
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toastTemplate" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex w-100 align-items-center">
        <div class="toast-body flex-grow-1">
          <i class="toast-icon me-2"></i>
          <span class="toast-message"></span>
        </div>
        <button type="button" class="btn-close my-auto me-2" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <div class="form form-signin">
    <div class="text-center main-title">
      <div class="icon-wrapper">
        <i class="fas fa-link fa-4x"></i>
      </div>
      <h1 class="display-5">URL Shortener</h1>
      <p>Create short, memorable links</p>
    </div>

    <form onsubmit="shortenURL(event)" id="form">
      <div class="form-group">
        <p>Enter a long URL below to create a short, shareable link.</p>
      </div>
      <div class="form-group">
        <textarea name="url" class="form-control" autocomplete="off" placeholder="URL to shorten" rows="3"></textarea>
      </div>
      <div class="form-group d-grid gap-2">
        <button type="submit" class="btn btn-primary w-100" id="submit-btn">
          <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true"></span>
          <span class="btn-text">Shorten URL</span>
        </button>
      </div>
    </form>

    <div id="results">
      <div id="response">
        <div id="response_body"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"
    integrity="sha512-HvOjJrdwNpDbkGJIG2ZNqDlVqMo77qbs4Me4cah0HoDrfhrbA+8SBlZn1KrvAQw7cILLPFJvdwIgphzQmMm+Pw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    const toast = {
      _show(type, message, duration = 5000) {
        const template = document.getElementById('toastTemplate');
        const toastEl = template.cloneNode(true);
        toastEl.removeAttribute('id');

        const icon = toastEl.querySelector('.toast-icon');
        const messageEl = toastEl.querySelector('.toast-message');

        if (type === 'success') {
          icon.className = 'fas fa-check toast-icon me-2';
          toastEl.style.backgroundColor = 'var(--cyan)';
        } else if (type === 'error') {
          icon.className = 'fas fa-exclamation-triangle toast-icon me-2';
          toastEl.style.backgroundColor = 'var(--red)';
        } else if (type === 'info') {
          icon.className = 'fas fa-spinner fa-spin toast-icon me-2';
          toastEl.style.backgroundColor = 'var(--purple)';
        }

        messageEl.textContent = message;

        document.querySelector('.toast-container').appendChild(toastEl);

        const bsToast = new bootstrap.Toast(toastEl, {
          delay: duration,
          autohide: type !== 'info'
        });
        bsToast.show();

        toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        return toastEl;
      },
      success(message) { return this._show('success', message); },
      error(message) { return this._show('error', message); },
      open(config) { return this._show(config.type, config.message, config.duration || 5000); },
      dismiss(toastEl) {
        if (toastEl) {
          const bsToast = bootstrap.Toast.getInstance(toastEl);
          if (bsToast) bsToast.hide();
        }
      }
    };

    document.addEventListener('click', function (e) {
      const btn = e.target.closest('[data-copy-target]');
      if (!btn) return;

      const target = document.querySelector(btn.dataset.copyTarget);
      const text = target ? target.textContent.trim() : '';

      navigator.clipboard.writeText(text).then(() => {
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<span class="checkmark"><i class="fas fa-check"></i></span> Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = originalHTML;
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        toast.error('Failed to copy to clipboard');
      });
    });

    async function shortenURL(event) {
      event.preventDefault();

      const form = new FormData(document.getElementById('form'));
      const url = form.get('url').trim();
      const results = document.getElementById('results');
      const responseBody = document.getElementById('response_body');
      const submitBtn = document.getElementById('submit-btn');
      const btnText = submitBtn.querySelector('.btn-text');
      const spinner = submitBtn.querySelector('.spinner-border');

      submitBtn.disabled = true;
      btnText.textContent = 'Shortening...';
      spinner.classList.remove('d-none');
      results.classList.remove('active');

      const infoToast = toast.open({ type: 'info', message: 'Creating short URL...' });

      try {
        const resp = await fetch('https://s.slvr.io/store', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_url: url })
        });

        if (!resp.ok) throw new Error('Server error');

        const data = await resp.json();
        const shortUrl = `https://s.slvr.io/${data.short_url_id}`;

        const alertEl = document.createElement('div');
        alertEl.className = 'alert alert-success mb-0';

        const copyBtn = document.createElement('button');
        copyBtn.type = 'button';
        copyBtn.className = 'copy-btn-float btn';
        copyBtn.dataset.copyTarget = '#short-url-text';
        copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';

        const link = document.createElement('a');
        link.id = 'short-url-text';
        link.className = 'short-url-link';
        link.href = shortUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = shortUrl;

        alertEl.appendChild(copyBtn);
        alertEl.appendChild(link);
        responseBody.replaceChildren(alertEl);
        results.classList.add('active');
        toast.dismiss(infoToast);
        toast.success('Short URL created!');

      } catch (error) {
        const alertEl = document.createElement('div');
        alertEl.className = 'alert alert-danger mb-0';
        alertEl.textContent = 'There was an error creating the short URL. Please try again.';

        responseBody.replaceChildren(alertEl);
        results.classList.add('active');
        toast.dismiss(infoToast);
        toast.error('Failed to create short URL');

      } finally {
        submitBtn.disabled = false;
        btnText.textContent = 'Shorten URL';
        spinner.classList.add('d-none');
      }
    }
  </script>
</body>

</html>
